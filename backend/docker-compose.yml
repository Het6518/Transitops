version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: transitops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: transitops
      POSTGRES_PASSWORD: transitops_pass
      POSTGRES_DB: transitops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transitops -d transitops_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for DB inspection (comment out if not needed)
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: transitops_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@transitops.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  # pgadmin_data:
